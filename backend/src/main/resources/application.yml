server:
  port: ${BACKEND_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5175,http://127.0.0.1:5175}

spring:
  application:
    name: wh-backend

integration:
  nlp:
    base-url: ${NLP_BASE_URL:http://localhost:8000}
    analyze-path: ${NLP_ANALYZE_PATH:/analyze}
    connect-timeout: ${NLP_CONNECT_TIMEOUT:1s}
    read-timeout: ${NLP_READ_TIMEOUT:3s}
  onebound:
    base-url: ${ONEBOUND_BASE_URL:https://api-gw.onebound.cn}
    api-key: ${ONEBOUND_API_KEY:}
    api-secret: ${ONEBOUND_API_SECRET:}
    default-platform: ${ONEBOUND_DEFAULT_PLATFORM:taobao}
