<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Task 12 Final Alignment Evidence</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #07111f;
        color: #eef4ff;
        font-family: 'Segoe UI', sans-serif;
      }

      .stack {
        display: grid;
        gap: 24px;
        max-width: 920px;
        margin: 0 auto;
      }

      .card {
        overflow: hidden;
        border: 1px solid rgba(132, 168, 211, 0.26);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(17, 31, 54, 0.95), rgba(9, 18, 34, 0.98));
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      }

      .label {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(128, 160, 196, 0.16);
        color: #7ab8ff;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        background: #07111f;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <section class="card">
        <div class="label">Login screen</div>
        <img src="flashy-showcase-ui/final-login-screen.png" alt="Final login screen" />
      </section>

      <section class="card">
        <div class="label">Authenticated shell overview</div>
        <img src="flashy-showcase-ui/final-shell-overview.png" alt="Final shell overview" />
      </section>

      <section class="card">
        <div class="label">Dense data screen</div>
        <img src="flashy-showcase-ui/final-dense-data-issues.png" alt="Final dense data issues screen" />
      </section>

      <section class="card">
        <div class="label">Showcase-heavy screen</div>
        <img src="flashy-showcase-ui/final-showcase-explainability.png" alt="Final showcase explainability screen" />
      </section>
    </div>
  </body>
</html>
